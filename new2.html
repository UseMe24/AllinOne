<!-- This Code IS Responsive-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    /* Header */
    header {
      background: #333;
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    /* Hero Section */
    .hero {
      height: 60vh;
      background: url('/mainBg_V1.gif') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      background: rgba(0,0,0,0.5);
      padding: 10px;
    }

    /* Content */
    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .box {
      flex: 1;
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
    }

    /* 📱 Responsive Design */
    @media (max-width: 768px) {
      nav ul {
        /* flex-direction: column; */
        gap: 5px;
      }
      nav ul li {
        margin-left: 5px;
        font-size: 14px;
      }

      .container {
        flex-direction: column;
      }

      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h2>MySite</h2>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Welcome to My Website</h1>
  </section>

  <section class="container">
    <div class="box">
      <h3>Box 1</h3>
      <p>Some content here...</p>
    </div>
    <div class="box">
      <h3>Box 2</h3>
      <p>Some content here...</p>
    </div>
    <div class="box">
      <h3>Box 3</h3>
      <p>Some content here...</p>
    </div>
  </section>

  <footer>
    <p>© 2026 MySite. All rights reserved.</p>
  </footer>

</body>
</html>
